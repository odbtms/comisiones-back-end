spring.application.name=comisiones

# --- PostgreSQL ---
# Los valores vienen por variables de entorno en Docker; los defaults
# (despues de los ':') sirven para correr en local.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/comisiones}
spring.datasource.username=${DB_USER:comisiones}
spring.datasource.password=${DB_PASSWORD:comisiones}

spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.open-in-view=false

# --- CORS: origen(es) del front React permitidos ---
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# --- Registro: validar que el dominio del email pueda recibir mail (DNS MX) ---
# true = rechaza dominios falsos/typos. Poner false si el entorno no tiene DNS.
app.registro.validar-dominio=${REGISTRO_VALIDAR_DOMINIO:true}

# --- Admin: que usuario tiene acceso al panel de administracion ---
app.admin.usuario-id=${ADMIN_USUARIO_ID:1}

# --- JWT (login) ---
# En prod el secreto viene por JWT_SECRET (debe ser largo, >= 32 bytes).
# El default es SOLO para desarrollo local.
app.jwt.secret=${JWT_SECRET:dev-secret-solo-local-cambiar-en-prod-1234567890abcdef}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# --- Actuator: solo exponemos health (para Docker / Oracle) ---
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# --- Reglas de calculo (defaults = los del Excel) ---
app.calculo.valor-hora-default=3208
app.calculo.iva=0.19
app.calculo.comision=0.03
app.calculo.colacion.umbral-horas=8
app.calculo.colacion.descuento-horas=1
